      narrative, and produces a complete proposal document with optional PDF export. Triggers on: "write a proposal", "draft
      a proposal", "create a project proposal", "generate a proposal for", "proposal with pricing tiers", "ROI proposal",
      "client proposal with estimates", "proposal with cost breakdown", "prepare a bid", "scope and pricing document". Use
      this agent when a structured client-facing proposal with pricing, ROI modeling, and professional formatting is needed
      — not for internal planning documents or architecture decisions.'
    path: agents/proposal-writer
    source: https://github.com/Mathews-Tom/armory/blob/main/agents/proposal-writer/AGENT.md
    model: opus
  - name: release-captain
    version: 1.0.0
    description: 'Ship lifecycle manager that drives code from branch to PR through quality gates, secret scanning, changelog
      generation, and dependency audits. Blocks on failing tests or CRITICAL findings. Produces versioned commits, changelog
      entries, and opens the pull request with full traceability. Triggers on: "ship this", "create a release", "open a PR",
      "prepare for release", "cut a release", "ship it", "ready to merge", "open pull request", "release this branch", "time
      to ship". Use this agent when code is ready to ship and needs quality gates, changelog, and PR creation rather than
      further development.'
    path: agents/release-captain
    source: https://github.com/Mathews-Tom/armory/blob/main/agents/release-captain/AGENT.md
    model: sonnet
  - name: research-analyst
    version: 1.0.0
    description: 'Deep research agent that conducts multi-source investigation and produces structured synthesis reports.
      Spawns parallel research agents across web, academic, video, and document sources, cross-references findings, identifies
      gaps and contradictions, and delivers cited analysis with confidence ratings. Triggers on: "research this topic", "investigate",
      "deep dive into", "what does the research say about", "survey the landscape", "analyze this space", "comprehensive research
      on", "gather evidence for", "research report on", "explore the state of", "literature survey", "multi-source analysis".
      Use this agent when a thorough investigation across multiple source types is needed rather than a quick web search or
      single-source lookup.'
    path: agents/research-analyst
    source: https://github.com/Mathews-Tom/armory/blob/main/agents/research-analyst/AGENT.md
    model: opus
  - name: secret-scanner
    version: 1.0.0
    description: 'Pre-commit secret detection agent scanning for hardcoded API keys, passwords, tokens, connection strings,
      private keys, and high-entropy strings. Detects known provider key patterns (AWS, GitHub, Slack, Stripe, Google, Azure),
      .env values leaked into source code, and PEM-encoded private keys. Designed for fast pre-commit gating with zero false-negative
      tolerance. Triggers on: "scan for secrets", "check for hardcoded keys", "secret detection", "credential scan", "find
      leaked keys", "check for passwords in code", "pre-commit secret check". Use this agent when code is about to be committed
      and needs a secrets gate.'
    path: agents/secret-scanner
    source: https://github.com/Mathews-Tom/armory/blob/main/agents/secret-scanner/AGENT.md
    model: haiku
  - name: security-reviewer
    version: 1.0.0
    description: 'Vulnerability scanner for OWASP Top 10 patterns including SQL injection, cross-site scripting (XSS), broken
      authentication, insecure deserialization, path traversal, SSRF, and security misconfiguration. Produces severity-ranked
      findings with exploit scenarios and remediation guidance. Triggers on: "security review", "scan for vulnerabilities",
      "check security", "audit security", "find security issues", "OWASP scan", "vulnerability check", "security analysis".
      Use this agent when code needs security-focused review for injection, authentication, or data exposure vulnerabilities.'
    path: agents/security-reviewer
    source: https://github.com/Mathews-Tom/armory/blob/main/agents/security-reviewer/AGENT.md
    model: sonnet
  - name: team-lead
    version: 1.0.0
    description: 'Meta-orchestrator agent that analyzes complex requests, decomposes them into agent-sized tasks, delegates
      to specialized agents, manages sequencing and parallelism, and synthesizes results into unified deliverables. Acts as
      the intelligent router and coordinator across the full agent team. Triggers on: "handle this end to end", "take care
      of everything", "coordinate the team", "manage this project", "orchestrate this work", "delegate this across agents",
      "team lead", "run the full pipeline", "I need the whole workflow", "end to end", "full lifecycle". Use this agent when
      a task spans multiple agent domains and needs coordination rather than a single focused agent.'
    path: agents/team-lead
    source: https://github.com/Mathews-Tom/armory/blob/main/agents/team-lead/AGENT.md
    model: opus
  hooks:
  - name: cost-tracker
    version: 1.0.0
    description: Logs session cost and token usage to a CSV file after each Claude Code session completes. Fires on the Stop
      event, reads cost and token data from the session summary JSON on stdin, and appends a row to ~/.claude/cost-log.csv.
      Use this hook when you want to track API spending over time, identify expensive sessions, or generate usage reports
      from the CSV data.
    path: hooks/cost-tracker
    source: https://github.com/Mathews-Tom/armory/blob/main/hooks/cost-tracker/HOOK.md
    events:
    - Stop
  - name: git-protection
    version: 1.0.0
    description: 'Blocks dangerous git operations that can cause irreversible data loss. Intercepts Bash tool invocations
      before execution and inspects the command string for destructive patterns: force-push (push --force / push -f), hard
      reset (reset --hard), deletion of main/master branches (branch -D main/master), and aggressive clean (clean -fd). Use
      this hook when working in repositories where accidental destructive git commands could wipe uncommitted work or rewrite
      shared history.'
    path: hooks/git-protection
    source: https://github.com/Mathews-Tom/armory/blob/main/hooks/git-protection/HOOK.md
    events:
    - PreToolUse
  - name: pre-edit-backup
    version: 1.0.0
    description: Creates a backup copy of any file before Claude Code edits it. Fires on PreToolUse for the Edit tool, reads
      the file_path from the tool input JSON, and copies the original file to ~/.claude/backups/ with a timestamped filename.
      Maintains a maximum of 20 backup files by deleting the oldest when the limit is exceeded. Use this hook when you want
      a local safety net for file edits that goes beyond git history.
    path: hooks/pre-edit-backup
    source: https://github.com/Mathews-Tom/armory/blob/main/hooks/pre-edit-backup/HOOK.md
    events:
    - PreToolUse
  rules:
  - name: commit-standards
    version: 1.0.0
    description: Enforces conventional commit format, branch naming conventions, and commit message structure for consistent
      version control history. Covers type prefixes (feat, fix, chore, docs, refactor, test, perf, ci, build, style), scope
      requirements, subject line constraints, body formatting, BREAKING CHANGE footers, and merge/squash policy. Use this
      rule when writing commit messages, naming branches, preparing pull requests, or establishing git workflow standards.
      Triggers on "commit message", "branch naming", "conventional commits", "git workflow", "commit format", "merge strategy",
      "squash commits".
    path: rules/commit-standards
    source: https://github.com/Mathews-Tom/armory/blob/main/rules/commit-standards/RULE.md
    scope: global
  - name: security-standards
    version: 1.0.0
    description: Defines security standards for application development including secret management (environment variables,
      vault integration, never hardcode), input validation at system boundaries, authentication and session handling (JWT,
      refresh tokens, session expiry), HTTP security headers, file upload restrictions, SQL parameterization, dependency scanning,
      and CORS policy. Use this rule when handling secrets, implementing authentication, validating user input, configuring
      HTTP security, processing file uploads, or writing database queries. Triggers on "security rules", "secret management",
      "input validation", "security standards", "JWT handling", "CORS policy", "SQL injection", "file upload security", "dependency
      scanning", "HTTP headers".
    path: rules/security-standards
    source: https://github.com/Mathews-Tom/armory/blob/main/rules/security-standards/RULE.md
    scope: global
  - name: test-standards
    version: 1.0.0
    description: Defines testing standards including coverage thresholds (80% overall, 90% new code, 95% critical paths),
      test naming conventions, structural patterns (arrange-act-assert), test categorization (unit/integration/e2e), fixture
      management, mock boundaries, and CI gate requirements. Use this rule when writing tests, setting up test infrastructure,
      reviewing test quality, or defining coverage requirements. Triggers on "test coverage", "testing standards", "test requirements",
      "coverage thresholds", "unit test", "integration test", "test structure", "arrange act assert", "mock boundaries", "test
      naming".
    path: rules/test-standards
    source: https://github.com/Mathews-Tom/armory/blob/main/rules/test-standards/RULE.md
    scope: global
  commands:
  - name: refactor
    version: 1.0.0
    description: 'Code simplification workflow that identifies and cleans recently modified files. Uses git diff to find changed
      files, analyzes cyclomatic complexity, detects duplicated logic, simplifies nested conditionals, extracts helpers only
      when justified, and verifies behavior preservation through tests. Triggers on: "/refactor", "clean up recent changes",
      "simplify this code", "reduce complexity", "clean before PR", "tidy up my code". Use this command when code works correctly
      but needs simplification before committing or merging.'
    path: commands/refactor
    source: https://github.com/Mathews-Tom/armory/blob/main/commands/refactor/COMMAND.md
  - name: security-scan
    version: 1.0.0
    description: 'Security audit workflow that scans a codebase path or scope for vulnerabilities across six categories: hardcoded
      secrets, input validation, authentication and authorization logic, dependency vulnerabilities, HTTP security headers,
      and misconfiguration. Produces severity-ranked findings with remediation guidance. Triggers on: "/security-scan", "scan
      for vulnerabilities", "security audit this code", "check for hardcoded secrets", "find security issues", "vulnerability
      scan". Use this command when auditing code for security issues before deployment or during review.'
    path: commands/security-scan
    source: https://github.com/Mathews-Tom/armory/blob/main/commands/security-scan/COMMAND.md
  - name: tdd
    version: 1.0.0
    description: 'Test-driven development workflow for functions, modules, or features. Guides Claude through the red-green-refactor
      cycle: understand requirements, write a failing test first, implement minimal code to pass, refactor, repeat. Enforces
      test-first discipline with rules for naming, assertion specificity, edge case generation, and cycle termination. Triggers
      on: "/tdd", "test-driven", "write tests first", "red green refactor", "TDD workflow", "test first development". Use
      this command when starting implementation work where tests should drive the design.'
    path: commands/tdd
    source: https://github.com/Mathews-Tom/armory/blob/main/commands/tdd/COMMAND.md
  utilities:
  - name: arxiv-search
    version: 1.0.0
    description: Searches arXiv for academic papers by keyword, author, title, or category and outputs structured JSON with
      full metadata (title, authors, abstract, dates, categories, DOI, PDF URL). Supports field-prefixed queries (au:, ti:,
      abs:, cat:), sorting by relevance/date, result limits, and direct ID lookup. Use this utility when you need to discover
      research papers, build a reading list, gather references for a literature review, fetch paper metadata by arXiv ID,
      or survey recent publications in a research area. Complements research-critique (per-paper analysis) and literature-review
      (multi-paper synthesis).
    path: utilities/arxiv-search
    source: https://github.com/Mathews-Tom/armory/blob/main/utilities/arxiv-search/UTILITY.md
    runtime: python
    complements:
    - literature-review
    - research-critique
  - name: dependency-tree
    version: 1.0.0
    description: Parses project dependency configuration files (pyproject.toml, package.json, go.mod) and prints a formatted
      dependency tree to stdout. Auto-detects project type from files present in the working directory. Supports depth limiting
      for large dependency graphs. Use this utility when you need to visualize project dependencies, inspect version constraints,
      or get a quick overview of what a project depends on without running package manager commands.
    path: utilities/dependency-tree
    source: https://github.com/Mathews-Tom/armory/blob/main/utilities/dependency-tree/UTILITY.md
    runtime: python
  - name: test-coverage-report
    version: 1.0.0
    description: Summarizes test coverage for recently changed files by comparing git diffs against existing test files. Runs
      git diff to identify changed source files, checks whether corresponding test files exist, and prints a summary table.
      Exits non-zero if any changed source file lacks a test file. Use this utility when reviewing a branch or commit to verify
      that changed code has accompanying tests before merging.
    path: utilities/test-coverage-report
    source: https://github.com/Mathews-Tom/armory/blob/main/utilities/test-coverage-report/UTILITY.md
    runtime: python
