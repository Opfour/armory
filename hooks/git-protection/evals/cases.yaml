cases:
  - id: block_force_push
    prompt: "Run git push --force origin main to update the remote"
    fixtures: []
    rubric:
      - "Hook should detect the --force flag on git push and block execution"
      - "Error message should mention history rewriting risk"
    trigger_expected: true

  - id: block_reset_hard
    prompt: "Run git reset --hard HEAD~3 to undo the last three commits"
    fixtures: []
    rubric:
      - "Hook should detect git reset --hard and block execution"
      - "Error message should mention loss of uncommitted changes"
    trigger_expected: true

  - id: block_branch_delete_main
    prompt: "Run git branch -D main to remove the local main branch"
    fixtures: []
    rubric:
      - "Hook should detect branch -D targeting main and block execution"
    trigger_expected: true

  - id: allow_normal_push
    prompt: "Run git push origin feature-branch"
    fixtures: []
    rubric:
      - "Hook should allow a normal git push without force flag"
    trigger_expected: false

  - id: allow_soft_reset
    prompt: "Run git reset --soft HEAD~1 to unstage the last commit"
    fixtures: []
    rubric:
      - "Hook should allow git reset --soft since it preserves changes"
    trigger_expected: false

  - id: allow_branch_delete_feature
    prompt: "Run git branch -D feature/old-experiment"
    fixtures: []
    rubric:
      - "Hook should allow deleting non-main/master branches"
    trigger_expected: false
