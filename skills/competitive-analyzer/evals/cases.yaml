cases:
  - id: full_competitive_analysis
    prompt: "Run a competitive analysis on the project management software market"
    fixtures: []
    rubric:
      - "identifies direct, indirect, and potential competitors"
      - "produces Porter's Five Forces scoring with evidence"
      - "builds a feature comparison matrix"
      - "includes pricing analysis and positioning"
    trigger_expected: true

  - id: competitor_comparison
    prompt: "Compare Notion, Coda, and Confluence as competitors in the knowledge management space"
    fixtures: []
    rubric:
      - "compares features across the named competitors"
      - "analyzes pricing models and positioning differences"
      - "identifies gaps and differentiators"
    trigger_expected: true

  - id: porters_five_forces
    prompt: "Do a Porter's Five Forces analysis of the cloud infrastructure market"
    fixtures: []
    rubric:
      - "scores each of the five forces with evidence"
      - "synthesizes overall industry attractiveness"
      - "identifies the dominant competitive pressures"
    trigger_expected: true

  - id: moat_assessment
    prompt: "What competitive moats does Stripe have and how defensible are they?"
    fixtures: []
    rubric:
      - "evaluates multiple moat types with evidence"
      - "assesses overall defensibility strength"
      - "identifies potential moat erosion risks"
    trigger_expected: true

  - id: competitive_landscape
    prompt: "Map the competitive landscape for AI code assistant tools"
    fixtures: []
    rubric:
      - "discovers competitors across tiers"
      - "produces a positioning map or comparison framework"
      - "identifies white space opportunities"
    trigger_expected: true

  - id: feature_matrix
    prompt: "Build a feature comparison matrix for the top CRM platforms"
    fixtures: []
    rubric:
      - "structures features into categories"
      - "scores competitors consistently across features"
      - "identifies table stakes vs differentiators"
    trigger_expected: true

  - id: negative_market_sizing
    prompt: "What is the total addressable market for cybersecurity software?"
    fixtures: []
    rubric:
      - "market sizing and TAM analysis is market-analyzer territory, not competitive analysis"
    trigger_expected: false

  - id: negative_internal_code_review
    prompt: "Review the architecture of our authentication module for weaknesses"
    fixtures: []
    rubric:
      - "internal code/architecture review is not competitive analysis"
    trigger_expected: false

  - id: negative_customer_research
    prompt: "What do our customers want in the next product release?"
    fixtures: []
    rubric:
      - "customer research and product feedback is not competitive analysis"
    trigger_expected: false
