cases:
  - id: saas_product_market_size
    prompt: "What's the market size for an AI-powered code review tool for enterprise teams?"
    fixtures: []
    rubric:
      - "produces TAM/SAM/SOM breakdown with methodology"
      - "identifies relevant market segments and growth rates"
      - "cites data sources or states assumptions explicitly"
    trigger_expected: true

  - id: tam_sam_som_request
    prompt: "I need a TAM SAM SOM analysis for a plant-based protein delivery service in the US"
    fixtures: []
    rubric:
      - "performs both top-down and bottom-up market sizing"
      - "segments customers by demographics or behavior"
      - "assesses market growth trajectory and adoption stage"
    trigger_expected: true

  - id: market_trends_request
    prompt: "Analyze the market trends for electric vehicle charging infrastructure in Europe"
    fixtures: []
    rubric:
      - "identifies growth trajectory with CAGR or equivalent metric"
      - "evaluates regulatory environment and macro trends"
      - "provides market opportunity score with rationale"
    trigger_expected: true

  - id: how_big_is_market
    prompt: "How big is the market for remote patient monitoring devices?"
    fixtures: []
    rubric:
      - "provides quantified market size estimate with source"
      - "distinguishes between total and serviceable market"
    trigger_expected: true

  - id: negative_pricing_strategy
    prompt: "What should I price my SaaS product at to maximize revenue?"
    fixtures: []
    rubric:
      - "pricing strategy and revenue optimization are outside market analysis scope"
    trigger_expected: false

  - id: negative_financial_model
    prompt: "Build me a three-year revenue forecast with unit economics"
    fixtures: []
    rubric:
      - "financial modeling and revenue forecasting are not market analysis"
    trigger_expected: false

  - id: negative_implementation
    prompt: "Help me implement a market data ingestion pipeline in Python"
    fixtures: []
    rubric:
      - "code implementation is outside market analysis scope"
    trigger_expected: false
