cases:
  - id: critique_paper_general
    prompt: "Critique this paper on transformer attention mechanisms"
    fixtures: []
    rubric:
      - "produces a coherent analytical response, not a numbered checklist of weaknesses"
      - "identifies what the paper contributes before identifying weaknesses"
      - "distinguishes between core-threatening limitations and standard field limitations"
    trigger_expected: true

  - id: evaluate_methodology
    prompt: "Is the methodology in this study sound? The sample size is small but the effect sizes are large"
    fixtures: []
    rubric:
      - "evaluates whether the limitation undermines the specific contribution"
      - "applies proportionality — does not treat small sample size as automatic disqualification"
      - "considers the realistic state of the field, not a platonic ideal"
    trigger_expected: true

  - id: assess_research_claims
    prompt: "Does the evidence in this preprint actually support what the authors claim?"
    fixtures: []
    rubric:
      - "separates mechanism claims from evidence claims"
      - "identifies where claims outrun evidence with specificity"
      - "closes with an honest assessment of what survives"
    trigger_expected: true

  - id: pre_submission_formatting
    prompt: "Check the formatting and citations in my paper before I submit it"
    fixtures: []
    rubric:
      - "formatting and citation hygiene is manuscript-review territory, not research critique"
    trigger_expected: false

  - id: write_literature_review
    prompt: "Write a literature review section about reinforcement learning from human feedback"
    fixtures: []
    rubric:
      - "writing new manuscript content is outside critique scope"
    trigger_expected: false

  - id: provenance_check
    prompt: "Verify that the figures in my manuscript are generated from the analysis scripts"
    fixtures: []
    rubric:
      - "computational provenance verification is manuscript-provenance territory, not research critique"
    trigger_expected: false
