name: Package All

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate manifest
        run: |
          python scripts/generate_manifest.py
          git diff --exit-code manifest.yaml

      - name: Package all items
        run: |
          mkdir -p dist
          DEFINITION_MAP="skills:SKILL.md agents:AGENT.md hooks:HOOK.md rules:RULE.md commands:COMMAND.md utilities:UTILITY.md presets:PRESET.md"

          for mapping in $DEFINITION_MAP; do
            type_dir="${mapping%%:*}"
            def_file="${mapping#*:}"
            if [ -d "${type_dir}" ]; then
              for pkg_dir in ${type_dir}/*/; do
                if [ -f "${pkg_dir}${def_file}" ]; then
                  echo "Packaging ${pkg_dir}..."
                  python scripts/package.py "${pkg_dir}" --output-dir dist
                else
                  echo "Skipping ${pkg_dir} — no ${def_file} found"
                fi
              done
            fi
          done

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: latest
          name: Latest Packages (rolling)
          body: |
            Rolling release — automatically updated on every push to `main`.

            Contains the latest packaged archives from the repository.
            For stable releases, use a versioned tag (e.g., `v1.0.0`).

            **Last updated:** ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
