name: Bug Report
description: Report a problem with a skill or workflow
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: input
    id: skill-name
    attributes:
      label: Skill Name
      description: Name of the affected skill (kebab-case).
      placeholder: e.g. my-skill-name
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Load skill in Claude Code
        2. Trigger with prompt "..."
        3. Observe behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Claude version, OS, and any other relevant context.
      placeholder: |
        Claude version: claude-opus-4-7
        OS: macOS 15.3
    validations:
      required: false
