name: Feature Request
description: Suggest a new feature or enhancement to the armory infrastructure
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What friction exists today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature and how it would work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered and why they're less suitable.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What part of armory does this affect?
      options:
        - Scripts / Infrastructure
        - CI / Workflows
        - Installer / Distribution
        - Adapter System
        - Documentation
        - Other
    validations:
      required: true
